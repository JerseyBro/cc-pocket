<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>cc-pocket — Splash</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #08090A; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  /* scaled preview wrapper so the full 1290×2796 canvas is visible */
  .wrap { width: 322.5px; height: 699px; }
  .screen {
    width: 1290px; height: 2796px; transform: scale(0.25); transform-origin: top left;
    position: relative; overflow: hidden;
    background: linear-gradient(180deg, #0E0F11 0%, #101113 55%, #0E0F11 100%);
  }
  /* very-low-contrast scanline texture */
  .scan {
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.014) 0 2px, transparent 2px 8px);
  }
  /* faint warm aura behind the mark */
  .aura {
    position: absolute; left: 50%; top: 37%; transform: translate(-50%,-50%);
    width: 1100px; height: 1100px; border-radius: 50%;
    background: radial-gradient(circle, rgba(217,119,87,0.07) 0%, transparent 60%);
  }
  .stack {
    position: absolute; left: 0; right: 0; top: 37%; transform: translateY(-50%);
    display: flex; flex-direction: column; align-items: center;
  }
  .logo { filter: drop-shadow(0 0 26px rgba(217,119,87,0.40)); }
  .wordmark {
    margin-top: 170px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-weight: 600; font-size: 132px; letter-spacing: -4px;
    color: #ECEDEE; white-space: nowrap;
  }
  .wordmark .cc { color: #D97757; }
  /* tiny grounding tagline, optional + ultra calm */
  .tag {
    position: absolute; left: 0; right: 0; bottom: 150px; text-align: center;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-weight: 500; font-size: 40px; letter-spacing: 6px;
    color: #6B7177; text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="wrap">
<div class="screen">
  <div class="scan"></div>
  <div class="aura"></div>
  <div class="stack">
    <svg class="logo" width="560" height="370" viewBox="0 0 560 370" xmlns="http://www.w3.org/2000/svg">
      <path d="M 70 40 L 230 195 L 70 350" fill="none" stroke="#D97757" stroke-width="78" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="330" y="30" width="150" height="330" rx="26" fill="#D97757"/>
    </svg>
    <div class="wordmark"><span class="cc">CC</span> Pocket</div>
  </div>
  <div class="tag">calm terminal companion</div>
</div>
</div>
</body>
</html>
