<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>cc-pocket — Icon</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #08090A; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  /* scaled preview wrapper so the full 1024 canvas is visible */
  .wrap { width: 512px; height: 512px; }
  .icon { width: 1024px; height: 1024px; transform: scale(0.5); transform-origin: top left; }
  svg { display: block; }
</style>
</head>
<body>
<div class="wrap">
<div class="icon" id="icon">
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- subtle vertical gradient background -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E0F11"/>
      <stop offset="0.6" stop-color="#121316"/>
      <stop offset="1" stop-color="#16181B"/>
    </linearGradient>
    <!-- faint warm aura behind the cluster -->
    <radialGradient id="aura" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#D97757" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#D97757" stop-opacity="0"/>
    </radialGradient>
    <!-- inner-glow: blurred bright copy sitting under the crisp glyph -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="11" result="b"/>
      <feMerge><feMergeNode in="b"/></feMerge>
    </filter>
  </defs>

  <!-- full-bleed background -->
  <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" fill="url(#aura)"/>

  <!-- soft glow layer (blurred, low opacity) -->
  <g filter="url(#glow)" opacity="0.42">
    <path d="M 360 392 L 480 512 L 360 632" fill="none" stroke="#E89070" stroke-width="64" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="554" y="384" width="116" height="256" rx="20" fill="#E89070"/>
  </g>

  <!-- crisp caret + block cursor -->
  <g>
    <path d="M 360 392 L 480 512 L 360 632" fill="none" stroke="#D97757" stroke-width="64" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="554" y="384" width="116" height="256" rx="20" fill="#D97757"/>
    <!-- inner highlight on the block so it feels lit from within -->
    <rect x="554" y="384" width="116" height="256" rx="20" fill="none" stroke="#F0A988" stroke-width="2" opacity="0.5"/>
  </g>
</svg>
</div>
</div>
</body>
</html>
