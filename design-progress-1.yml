          - generic [ref=e457]: "Keep consistent with the existing cc-pocket design system (dark tokens, hairline elevation, terracotta accent #D97757, system sans for prose, monospace only for code/paths). Design the \"Claude asks you\" question module for the MOBILE Chat screen (phone portrait) — the UI for Claude Code's AskUserQuestion tool. CONTEXT: While a session is running, Claude may pause its turn to ask the user 1-4 multiple-choice questions (each question: 2-4 options, every option has a short label plus a one-line description; a question may be multi-select). The turn stays paused until the user answers. This is a COLLABORATION moment, not a safety gate — the app already has a PermissionSheet (shield icon, warning colors, countdown ring) for dangerous-tool approval; this question module must feel visibly calmer and friendlier: no countdown, no warning colors, accent-colored not danger-colored. It appears docked above the composer inside the chat (the conversation stays scrollable above it, so the user can re-read context before answering). After answering, the card collapses into a compact \"answered\" row inside the message stream and the turn resumes. LAYOUT (card, top to bottom): - Docked above the composer, full-width with 12pt side margins, raised surface #1E2125, 1px hairline border, radius 16, with a subtle terracotta attention cue on arrival (e.g. a soft accent top-hairline or brief glow — keep it quiet). - Header row: a small round icon (question-mark glyph, terracotta on 12% terracotta background) + secondary text \"Claude has a question\" (13sp) + on multi-question calls a progress caption \"1/3\" on the right. - Multi-question only: a row of small chip-tabs using each question's short header (max 12 chars). Answered chips show a tiny check and accent tint; the active chip is filled; tapping a chip switches question. - Question text: 15.5sp semibold, sans-serif prose (NOT monospace). - Options: a vertical list of selectable rows, min height 44pt, radius 12, base #0E0F11 background with hairline border. Each row: a radio (single-select) or checkbox (multi-select) + option label (14.5sp medium) + one-line description (12.5sp secondary). Selected state: terracotta border + ~8% terracotta fill + filled control. Always append an automatic last row \"Other…\" which, when tapped, expands into an inline single-line text field inside the row. - Below the options: a quiet link-style affordance \"Reply in your own words…\" that swaps the whole options area for a multiline text field (freeform answer instead of the structured choices). - Footer: a filled terracotta primary button \"Answer\" (disabled until every question has a selection; on a single-question single-select call it may enable immediately on tap), and a muted tertiary \"Skip\" on the left (politely declines; Claude continues without answers). COMPONENTS: reuse the app's existing atoms — hairline cards, 44pt round/filled buttons, small chip badges (same family as the permission-mode badges). New molecules: the option row (control + two-line text) and the header chip-tab row. STATES / DELIVERABLES (dark theme, mobile portrait ~390pt wide; show state 1 in full Chat-screen context — message stream above, composer below — and the rest as card-level variants side by side on one board): 1. Default: single question, single-select, nothing selected yet, docked above the composer. 2. Multi-question: three chip-tabs, Q1 answered (checked chip), Q2 active with one option selected, progress \"2/3\". 3. Multi-select question: 2 of 4 options checked, \"Other…\" row expanded with typed text. 4. Freeform mode: options collapsed away, multiline text field with the user's draft + the Answer button. 5. Answered transcript row (after submit): a compact row in the message stream — question icon + \"Answered 3 questions\" + the chosen labels as tiny chips; visually quiet, tappable to expand. 6. Withdrawn: the card replaced by a one-line muted notice \"Claude moved on — answers no longer needed\", auto-fading. 7. Cross-machine inbox row (compact): machine name + first question preview + an accent \"Answer\" affordance, matching the existing attention-inbox row style. Also show: keyboard-open behavior for states 3/4 (the card lifts with the IME, composer hidden while the card owns text input). Respect safe areas. Demo content in Simplified Chinese where user-visible (question text, options), UI chrome labels stay English."
