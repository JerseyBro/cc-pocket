name: iosApp
options:
  bundleIdPrefix: com.JerseyBro
  deploymentTarget:
    iOS: "15.0"
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: "11.0.0"
targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
    dependencies:
      - package: Firebase
        product: FirebaseAnalytics
      - package: Firebase
        product: FirebaseCrashlytics
    settings:
      base:
        # dev.ccpocket.app 被旧 Apple 账号占用（bundle ID 跨 team 全局唯一），换账号后改用此 ID
        PRODUCT_BUNDLE_IDENTIFIER: com.JerseyBro.ccpocket
        PRODUCT_NAME: cc-pocket
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: iosApp/Info.plist
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: NO
        # iPhone only. Without this, xcodegen defaults to "1,2" (universal) and App Store validation
        # rejects the Portrait-only Info.plist for iPad multitasking. The committed .xcodeproj already
        # has TARGETED_DEVICE_FAMILY=1; declaring it here keeps the CI-regenerated project in sync.
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/../mobile/composeApp/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)
        OTHER_LDFLAGS:
          - $(inherited)
          - -framework
          - ComposeApp
    preBuildScripts:
      - name: Compile Kotlin Framework
        basedOnDependencyAnalysis: false
        script: |
          set -e
          # Xcode 的构建环境里常见两个问题：
          # 1) JAVA_HOME 为空或指向不存在的 JDK；
          # 2) 本机只装了 21，没有 17。
          # 这里优先复用有效的 JAVA_HOME，再自动探测可用 JDK。
          if [ -z "${JAVA_HOME:-}" ] || [ ! -d "$JAVA_HOME" ]; then
            JAVA_HOME="$(/usr/libexec/java_home -v 21 2>/dev/null || /usr/libexec/java_home -v 17 2>/dev/null || true)"
            if [ -z "${JAVA_HOME:-}" ] || [ ! -d "$JAVA_HOME" ]; then
              for candidate in /opt/homebrew/opt/openjdk@21 /opt/homebrew/opt/openjdk@17; do
                if [ -d "$candidate" ]; then
                  JAVA_HOME="$candidate"
                  break
                fi
              done
            fi
          fi
          if [ -z "${JAVA_HOME:-}" ] || [ ! -d "$JAVA_HOME" ]; then
            echo "ERROR: No valid JDK found. Install JDK 21 or 17, or set JAVA_HOME."
            exit 1
          fi
          export JAVA_HOME
          cd "$SRCROOT/.."
          ./gradlew :mobile:composeApp:embedAndSignAppleFrameworkForXcode
