# 6g: the iOS release link (K/N LTO devirtualization) OOMs at 2g
org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8
kotlin.native.jvmArgs=-Xmx6g
org.gradle.caching=true
org.gradle.parallel=true
# JDK 17 comes from the Gradle toolchain (the foojay resolver in settings.gradle.kts
# downloads it when missing). Machine-specific pins like org.gradle.java.home don't
# belong in this shared file — put one in ~/.gradle/gradle.properties if you want it.
kotlin.code.style=official
android.useAndroidX=true
android.nonTransitiveRClass=true
