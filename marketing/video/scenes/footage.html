<!DOCTYPE html><html lang="zh" data-theme="dark"><head><meta charset="utf-8">
<link rel="stylesheet" href="../rig/scene.css"><script src="../rig/rig.js"></script>
<style>
  /* full-bleed AI footage: pre-extracted PNG sequence, never <video> (headless
     seek is not frame-accurate — determinism contract) */
  .fb { position:absolute; inset:0; overflow:hidden; }
  .fb img { width:100%; height:100%; display:block; }
  .fb.cover img { object-fit:cover; } .fb.contain img { object-fit:contain; background:#0E0F11; }
  .fb::after { content:""; position:absolute; inset:0; pointer-events:none;
    background:linear-gradient(to bottom, rgba(14,15,17,.35), transparent 30%,
               transparent 62%, rgba(14,15,17,.55)); } /* keep kicker/subline readable */
</style></head><body>
<div class="stage">
  <div class="fb" id="fb"><img id="fr" alt=""></div>
  <div class="brandchip"><img src="../../../site/favicon.svg">CC Pocket</div>
  <div class="kicker"><div class="k1" data-caption></div></div>
  <div class="subline"><span data-sub></span></div>
</div>
<script>
const Q=new URLSearchParams(location.search);
const BASE=Q.get('frames'), N=parseInt(Q.get('n')||'1',10), SFPS=parseInt(Q.get('sfps')||'30',10);
const SHORT=Q.get('short')||'freeze';
document.getElementById('fb').classList.add(Q.get('fit')==='contain'?'contain':'cover');
const img=document.getElementById('fr');
const cache=[]; let loaded=0;
window.STAGE_READY=false;
for(let i=0;i<N;i++){const im=new Image();im.onload=im.onerror=()=>{if(++loaded>=N)window.STAGE_READY=true;};
  im.src=`${BASE}/f${String(i).padStart(5,'0')}.png`;cache.push(im);}
window.SCENE={frame(t){
  RIG.enter(RIG.$('.brandchip'),t,0,{dy:0,dur:400,delay:0});
  RIG.enter(RIG.$('.kicker'),t,0,{dy:28,dur:520,delay:120,curve:RIG.KICK});
  RIG.wipe(RIG.$('.kicker em'),t,960);
  RIG.enter(RIG.$('.subline'),t,0,{dy:16,dur:460,delay:380,curve:RIG.KICK});
  let idx=Math.floor(t/1000*SFPS);
  idx = SHORT==='loop' ? idx%N : Math.min(N-1,idx);   // freeze = clamp（现行 stage 行为）
  img.src=cache[idx].src;
}};
</script></body></html>
