<!DOCTYPE html><html lang="zh" data-theme="dark"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../../site/styles.css"><link rel="stylesheet" href="../rig/scene.css">
<script src="../rig/rig.js"></script>
<style>
.hero{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;}
.hero .icon{width:150px;height:150px;border-radius:34px;opacity:0;
  box-shadow:0 40px 90px -30px #000, 0 0 80px -20px rgba(217,119,87,0.45);}
.hero .name{font-family:'JetBrains Mono',monospace;font-size:46px;font-weight:700;color:#ECEDEE;opacity:0;}
.hero .tags{display:flex;gap:10px;opacity:0;}
.hero .tags span{font-size:16px;color:#ECEDEE;background:#16181B;border:1px solid #2A2E33;
  border-radius:999px;padding:7px 16px;}
.hero .tags span.hot{color:#D97757;border-color:rgba(217,119,87,0.5);}
.hero .facts{font-family:'JetBrains Mono',monospace;font-size:17px;color:#9BA1A6;opacity:0;}
.hero .facts b{color:#D97757;font-weight:600;}
.hero .cutoff{font-size:12px;color:#6B7177;opacity:0;font-family:'JetBrains Mono',monospace;}
</style></head><body>
<div class="stage">
  <div class="brandchip"><img src="../../../site/favicon.svg">CC Pocket</div>
  <div class="kicker"><div class="k1" data-caption></div></div>
  <div class="hero">
    <img class="icon" src="../../../site/favicon.svg">
    <div class="name">CC Pocket</div>
    <div class="tags"><span class="hot">一个人开发</span><span>MIT 开源</span><span>免费</span></div>
    <div class="facts" id="facts"></div>
    <div class="cutoff" id="cutoff"></div>
  </div>
  <div class="subline"><span data-sub></span></div>
</div>
<script>
const Q=new URLSearchParams(location.search);
document.getElementById('facts').innerHTML=
  `<b>${Q.get('days')||'34'}</b> 天 · <b>${Q.get('commits')||'348'}</b> commits · <b>${Q.get('releases')||'19'}</b> 个版本`;
document.getElementById('cutoff').textContent=`截至 ${Q.get('cutoff')||'2026-07-13'}`;
window.SCENE={frame(t){
  RIG.enter(RIG.$('.brandchip'),t,0,{dy:0,dur:400});
  RIG.enter(RIG.$('.kicker'),t,0,{dy:28,dur:520,delay:120,curve:RIG.KICK});
  RIG.wipe(RIG.$('.kicker em'),t,960);
  RIG.enter(RIG.$('.icon'),t,0,{dy:34,dur:640,delay:80,curve:RIG.SHELL,scale:0.9});
  RIG.enter(RIG.$('.name'),t,0,{dy:24,dur:560,delay:260,curve:RIG.KICK});
  RIG.enter(RIG.$('.tags'),t,0,{dy:18,dur:520,delay:460,curve:RIG.KICK});
  RIG.enter(RIG.$('.facts'),t,0,{dy:16,dur:520,delay:660,curve:RIG.KICK});
  RIG.enter(RIG.$('.cutoff'),t,0,{dy:10,dur:420,delay:860,curve:RIG.KICK});
  RIG.enter(RIG.$('.subline'),t,0,{dy:16,dur:460,delay:520,curve:RIG.KICK});
}};
</script></body></html>
