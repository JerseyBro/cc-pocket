<!DOCTYPE html><html lang="zh" data-theme="dark"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../../site/styles.css"><link rel="stylesheet" href="../rig/scene.css">
<script src="../rig/rig.js"></script>
<style>
.nwrap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;}
.nrow{display:flex;align-items:baseline;gap:16px;opacity:0;}
.nrow b{font-family:'JetBrains Mono',monospace;font-size:74px;font-weight:700;color:#D97757;
  font-variant-numeric:tabular-nums;line-height:1;}
.nrow span{font-size:26px;color:#ECEDEE;}
.cutoff{font-family:'JetBrains Mono',monospace;font-size:14px;color:#6B7177;opacity:0;margin-top:8px;}
</style></head><body>
<div class="stage">
  <div class="brandchip"><img src="../../../site/favicon.svg">CC Pocket</div>
  <div class="kicker"><div class="k1" data-caption></div></div>
  <div class="nwrap" id="nw">
    <div class="nrow"><b>1</b><span>个人</span></div>
    <div class="nrow"><b id="days">34</b><span>天</span></div>
    <div class="nrow"><b id="commits">348</b><span>次提交</span></div>
    <div class="nrow"><b id="releases">19</b><span>个版本</span></div>
    <div class="cutoff" id="cutoff"></div>
  </div>
  <div class="subline"><span data-sub></span></div>
</div>
<script>
const Q=new URLSearchParams(location.search);
for(const k of ['days','commits','releases']) if(Q.get(k)) document.getElementById(k).textContent=Q.get(k);
document.getElementById('cutoff').textContent=`截至 ${Q.get('cutoff')||'2026-07-13'}`;
window.SCENE={frame(t){
  RIG.enter(RIG.$('.brandchip'),t,0,{dy:0,dur:400});
  RIG.enter(RIG.$('.kicker'),t,0,{dy:28,dur:520,delay:120,curve:RIG.KICK});
  RIG.wipe(RIG.$('.kicker em'),t,960);
  RIG.$$('.nrow').forEach((r,i)=>RIG.enter(r,t,0,{dy:24,dur:540,delay:260+i*420,curve:RIG.SHELL}));
  RIG.enter(RIG.$('.cutoff'),t,0,{dy:10,dur:420,delay:260+4*420,curve:RIG.KICK});
  RIG.enter(RIG.$('.subline'),t,0,{dy:16,dur:460,delay:520,curve:RIG.KICK});
}};
</script></body></html>
