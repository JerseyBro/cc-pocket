<!DOCTYPE html><html lang="zh" data-theme="dark"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../../site/styles.css"><link rel="stylesheet" href="../rig/scene.css">
<script src="../rig/rig.js"></script>
<style>
.wrap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.card{width:330px;display:flex;align-items:center;gap:14px;background:#16181B;border:1px solid #2A2E33;
  border-radius:16px;padding:16px 20px;opacity:0;box-shadow:0 24px 50px -28px #000;}
.card .ic{width:38px;height:38px;border-radius:10px;background:rgba(217,119,87,0.14);display:flex;
  align-items:center;justify-content:center;color:#D97757;font-size:19px;flex:none;}
.card .tt{font-size:19px;font-weight:600;color:#ECEDEE;}
.card .dd{font-size:13px;color:#9BA1A6;font-family:'JetBrains Mono',monospace;margin-top:2px;}
.funnel{opacity:0;display:flex;flex-direction:column;align-items:center;gap:6px;margin-top:10px;}
.funnel .arr{color:#D97757;font-size:26px;line-height:1;}
.funnel .to{display:flex;align-items:center;gap:10px;background:rgba(217,119,87,0.12);
  border:1px solid rgba(217,119,87,0.45);border-radius:999px;padding:12px 26px;}
.funnel .to img{width:26px;height:26px;border-radius:7px;}
.funnel .to b{font-family:'JetBrains Mono',monospace;font-size:20px;color:#ECEDEE;}
.funnel .cond{font-size:14px;color:#9BA1A6;}
</style></head><body>
<div class="stage">
  <div class="brandchip"><img src="../../../site/favicon.svg">CC Pocket</div>
  <div class="kicker"><div class="k1" data-caption></div></div>
  <div class="wrap">
    <div class="card"><div class="ic">◉</div><div><div class="tt">官方订阅</div><div class="dd">Pro / Max 登录态直接用</div></div></div>
    <div class="card"><div class="ic">⚿</div><div><div class="tt">API key</div><div class="dd">ANTHROPIC_API_KEY</div></div></div>
    <div class="card"><div class="ic">⇄</div><div><div class="tt">第三方网关</div><div class="dd">自定义 Base URL</div></div></div>
    <div class="card"><div class="ic">⌘</div><div><div class="tt">自定义模型</div><div class="dd">cc-switch · kimi-k2 · 任意 id</div></div></div>
    <div class="funnel">
      <div class="cond">本机 Claude 能跑</div>
      <div class="arr">↓</div>
      <div class="to"><img src="../../../site/favicon.svg"><b>CC Pocket 就能管</b></div>
    </div>
  </div>
  <div class="subline"><span data-sub></span></div>
</div>
<script>
window.SCENE={frame(t){
  RIG.enter(RIG.$('.brandchip'),t,0,{dy:0,dur:400});
  RIG.enter(RIG.$('.kicker'),t,0,{dy:28,dur:520,delay:120,curve:RIG.KICK});
  RIG.wipe(RIG.$('.kicker em'),t,960);
  RIG.$$('.card').forEach((c,i)=>RIG.enter(c,t,0,{dy:26,dur:520,delay:420+i*340,curve:RIG.SHELL,scale:0.97}));
  RIG.enter(RIG.$('.funnel'),t,0,{dy:22,dur:560,delay:420+4*340+200,curve:RIG.KICK});
  RIG.enter(RIG.$('.subline'),t,0,{dy:16,dur:460,delay:520,curve:RIG.KICK});
}};
</script></body></html>
