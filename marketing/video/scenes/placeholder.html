<!DOCTYPE html><html lang="zh" data-theme="dark"><head><meta charset="utf-8">
<link rel="stylesheet" href="../rig/scene.css"><script src="../rig/rig.js"></script>
<style>
  /* dev-only placeholder（--allow-placeholder）：正式发布模式下管线直接报错，
     不允许占位素材进成片（方案第九节） */
  .ph { position:absolute; inset:0; display:flex; flex-direction:column;
        align-items:center; justify-content:center; gap:14px;
        background:repeating-linear-gradient(45deg,#17191C 0 22px,#131518 22px 44px); }
  .ph .pid { font-family:'JetBrains Mono',monospace; font-size:26px; color:#9BA1A6; }
  .ph .wm { font-family:'JetBrains Mono',monospace; font-size:15px; letter-spacing:.2em;
            color:#D97757; border:1px dashed #D97757; padding:6px 14px; border-radius:6px; }
</style></head><body>
<div class="stage">
  <div class="ph"><div class="pid" id="pid"></div><div class="wm">MISSING FOOTAGE / SCENE</div></div>
  <div class="brandchip"><img src="../../../site/favicon.svg">CC Pocket</div>
  <div class="kicker"><div class="k1" data-caption></div></div>
  <div class="subline"><span data-sub></span></div>
</div>
<script>
const Q=new URLSearchParams(location.search);
document.getElementById('pid').textContent=Q.get('pid')||'?';
window.SCENE={frame(t){
  RIG.enter(RIG.$('.kicker'),t,0,{dy:28,dur:520,delay:120,curve:RIG.KICK});
  RIG.wipe(RIG.$('.kicker em'),t,960);
  RIG.enter(RIG.$('.subline'),t,0,{dy:16,dur:460,delay:380,curve:RIG.KICK});
}};
</script></body></html>
